body:
  query: |-
    # Exercises EpisodeContributionsLoader and the episodeID.Value dereference
    # in graph/api/contributions.utils.go (previously *episodeID).
    query PersonContributions($id: ID!) {
      person(id: $id) {
        id
        name
        contributionTypes {
          type { code }
          count
        }
        contributions(first: 200) {
          total
          items {
            type { code }
            contentType{
              code
              title
            }
            item {
              __typename
              ... on Episode { id title }
              ... on Chapter { id title episode { id } }
            }
          }
        }
      }
    }
  variables: |-
    {
      "id": "7e39462c-8f7f-49fa-ac9d-f2a01caaa0f2"
    }
