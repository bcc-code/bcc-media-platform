body:
  query: |-
    # Broad fan-out: ShowLoader, SeasonLoader, EpisodeLoader, ChaptersLoader,
    # FilesLoader, StreamsLoader, SongIDsForMediaItemLoader -- all wired through
    # the new New / NewListLoader factories.
    query ShowDeep($id: ID!) {
      show(id: $id) {
        id
        title
        seasons(first: 3) {
          items {
            id
            title
            number
            episodes(first: 5) {
              items {
                id
                title
                duration
                chapters {
                  id
                  title
                  start
                  duration
                }
                songs {
                  id
                  title
                }
              }
            }
          }
        }
      }
    }
  variables: |-
    {
      "id": "10"
    }
bodyType: graphql
