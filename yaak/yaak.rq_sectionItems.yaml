body:
  query: |-
    # Exercises CollectionItemLoader (NewListLoader) plus the rewritten
    # entries-with-roles SQL (UNION ALL, commit 503cffd9) and the inlined
    # role aggregations in getPermissionsForEpisodes (commit 06c07872).
    query SectionItems($id: ID!) {
      section(id: $id) {
        __typename
        id
        title
        ... on ItemSection {
          metadata {
            collectionId
            useContext
          }
          items(first: 20) {
            total
            items {
              id
              title
              sort
              item {
                __typename
                ... on Episode { id title }
                ... on Show { id title }
                ... on Short { id title }
              }
            }
          }
        }
      }
    }
  variables: |-
    {
      "id": "146"
    }
bodyType: graphql
