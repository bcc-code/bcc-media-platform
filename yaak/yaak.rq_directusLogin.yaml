folderId: null
authentication: {}
authenticationType: none
body:
  query: |-
    mutation Login($email: String!, $password: String!) {
      auth {
        login(email: $email, password: $password) {
          accessToken
          expiresInMs
          user {
            id
            email
            firstName
            lastName
            avatarUrl
          }
        }
      }
    }
  variables: |-
    {
      "email": "${[ DIRECTUS_EMAIL ]}",
      "password": "${[ DIRECTUS_PASSWORD ]}"
    }
bodyType: graphql
description: Log in via the admin GraphQL auth mutation (credentials are proxied to Directus server-side) and get a short-lived access token. The "Admin API query" request chains this automatically via its bearer auth.
headers:
- enabled: true
  name: Content-Type
  value: application/json
  id: h_ct_directusLogin
method: POST
name: Admin login
sortPriority: 5000.0
url: ${[ ADMIN_API_URL ]}/admin
urlParameters: []
