body:
  query: "# Lists past calendar events. Calendar.events(from, to) filters by overlap\n# with the [from, to] window (RFC3339), so a window ending \"now\" returns\n# events that already started/ended.\nquery PastEvents($from: Date!, $to: Date!) {\n  calendar {\n    events(from: $from, to: $to) {\n      id\n      title\n      start\n      end\n      image\n      entries {\n        __typename\n        id\n        title\n        start\n        end\n        \n        buffer {\n          url\n          availableUntil\n        }\n        ... on EpisodeCalendarEntry {\n          isReplay\n          episode {\n            id\n            title\n            streams{\n              type\n              videoLanguage\n            }\n          }\n        }\n        ... on ShowCalendarEntry {\n          show {\n            id\n            title\n          }\n        }\n        ... on SeasonCalendarEntry {\n          season {\n            id\n            title\n          }\n        }\n      }\n    }\n  }\n}"
  variables: |-
    {
      "from": "2026-04-01T00:00:00Z",
      "to": "2026-06-10T00:00:00Z"
    }
bodyType: graphql
description: Past calendar events from the last year up to today. Requires a profile (authenticated).
