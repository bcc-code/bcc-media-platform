body:
  query: |-
    # Exercises the same SongIDsForMediaItemLoader path reached through the
    # Short MediaItem implementer (shorts.utils.go).
    query ShortWithSongs($id: UUID!) {
      short(id: $id) {
        id
        title
        songs {
          id
          title
          contributors {
            person { name }
            contributionTypes
          }
        }
      }
    }
