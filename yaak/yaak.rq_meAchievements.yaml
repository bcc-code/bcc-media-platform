body:
  query: |-
    # Exercises the profile-scoped Mapping loaders:
    #   AchievementsLoader, UnconfirmedAchievementsLoader,
    #   AchievementGroupAchievementsLoader (all []*Mapping[uuid.UUID,uuid.UUID])
    # Requires a valid bearer token via the workspace oauth2 flow.
    query MeAchievements {
      me {
        id
        firstName
        roles
      }
      profile {
        id
      }
      achievementGroups(first: 10) {
        items {
          id
          title
          achievements(first: 10) {
            items {
              id
              title
              achievedAt
            }
          }
        }
      }
      pendingAchievements {
        id
        title
      }
    }
  variables: '{}'
bodyType: graphql
description: Me -> profile -> achievements/progress. Exercises profile-scoped Mapping loaders (achievements, group achievements, pending). Needs a logged-in token.
