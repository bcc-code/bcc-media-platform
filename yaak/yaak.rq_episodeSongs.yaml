body:
  query: |-
    # Exercises:
    #   SongIDsForMediaItemLoader (NewListLoader, returns []*Mapping[uuid.UUID,uuid.UUID])
    #   SongLoader.GetMany, SongContributionsLoader (NewListLoader)
    #   EpisodeContributorsLoader
    query EpisodeWithSongs($id: ID!) {
      episode(id: $id) {
        id
        title
        contributors {
          person { id name }
          contributionTypes
        }
        songs {
          id
          title
          key
          urls
          contributors {
            person { id name }
            contributionTypes
          }
        }
      }
    }
  variables: |-
    {
      "id": "3034"
    }
